<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hands-Free Stimulation Trainer Pro</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-color: #1a1a1e;
            --accent-color: #ff2a74;
            --accent-glow: rgba(255, 42, 116, 0.4);
            --text-color: #eee;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            background: var(--card-color);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px var(--accent-glow);
            width: 100%;
            max-width: 500px;
            text-align: center;
            border: 1px solid rgba(255, 42, 116, 0.2);
        }

        h1 {
            color: var(--accent-color);
            font-size: 24px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hidden {
            display: none !important;
        }

        .setup-screen, .challenge-screen {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin: 20px 0;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            text-align: left;
            gap: 8px;
        }

        .input-group label {
            font-size: 14px;
            color: #a0a0a9;
        }

        .input-group input, .input-group select {
            background: #121214;
            border: 1px solid #3f3f46;
            padding: 12px;
            color: #fff;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: var(--accent-color);
        }

        .phallo-container {
            position: relative;
            width: 140px;
            height: 320px;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .phallo-shape {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #25252b;
            border: 3px solid #3f3f46;
            border-radius: 40px 40px 20px 20px;
            overflow: hidden;
            z-index: 1;
        }

        .shaft {
            position: absolute;
            bottom: 0;
            width: 80px;
            height: 240px;
            left: 30px;
            background: inherit;
            border-left: 3px solid #3f3f46;
            border-right: 3px solid #3f3f46;
        }

        .glans {
            position: absolute;
            top: 15px;
            width: 96px;
            height: 80px;
            left: 22px;
            background: inherit;
            border: 3px solid #3f3f46;
            border-radius: 50% 50% 40% 40%;
        }

        .balls-left, .balls-right {
            position: absolute;
            bottom: -5px;
            width: 70px;
            height: 70px;
            background: inherit;
            border: 3px solid #3f3f46;
            border-radius: 50%;
        }
        .balls-left { left: 5px; }
        .balls-right { right: 5px; }

        .fluid-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            background: linear-gradient(0deg, #ff2a74 0%, #ff75a0 100%);
            z-index: 2;
            transition: height 0.2s ease;
        }

        .phallo-mask {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        .percentage-label {
            font-size: 14px;
            color: #a0a0a9;
            margin-top: 5px;
        }

        .metronome {
            width: 16px;
            height: 16px;
            background-color: #3f3f46;
            border-radius: 50%;
            margin: 15px auto;
            transition: background-color 0.05s ease;
        }

        .metronome.pulse {
            background-color: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-color), 0 0 5px #fff;
            transform: scale(1.15);
        }

        .instruction-box {
            background: #121214;
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            border-left: 4px solid var(--accent-color);
        }

        .style-tag {
            display: inline-block;
            background: var(--accent-color);
            color: #000;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .metric {
            font-size: 28px;
            font-weight: bold;
            margin: 5px 0;
            color: #fff;
        }

        .timer {
            font-size: 16px;
            color: #a0a0a9;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .action-btn {
            background: linear-gradient(135deg, #ff2a74 0%, #c1124d 100%);
            border: none;
            color: white;
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 42, 116, 0.3);
            text-transform: uppercase;
        }

        .action-btn.secondary {
            background: #25252b;
            box-shadow: none;
            border: 1px solid #3f3f46;
        }

        .action-btn:active {
            transform: scale(0.98);
        }
        
        .status-text {
            font-size: 16px;
            color: #ff2a74;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .high-score {
            font-size: 12px;
            color: #a0a0a9;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Stimulation Trainer Pro</h1>
        
        <!-- Pre-game Configuration Panel -->
        <div id="setupScreen" class="setup-screen">
            <div class="input-group">
                <label for="bpmInput">Select Pace (BPM):</label>
                <input type="number" id="bpmInput" min="40" max="220" value="90">
            </div>
            
            <div class="input-group">
                <label for="styleInput">Select Playstyle Play Mode:</label>
                <select id="styleInput">
                    <option value="normal">Normal (Experience Pleasure)</option>
                    <option value="denial">Cum Denial (Frustration Finish)</option>
                    <option value="infinite">Infinite Mode (Survival Endurance)</option>
                </select>
            </div>
            
            <button class="action-btn" id="startBtn">Start Session</button>
        </div>

        <!-- Too Close Decision Overlay -->
        <div id="challengeScreen" class="challenge-screen hidden">
            <h2 style="color: var(--accent-color);">Too Close!</h2>
            <p>Your arousal levels are peaking. Choose your escape route:</p>
            <button class="action-btn" id="challengeOptBtn">1. Complete a Random Challenge</button>
            <button class="action-btn secondary" id="breakOptBtn">2. Take a Short 20s Break Instead</button>
        </div>

        <!-- Main Realtime Automated Driver Dashboard -->
        <div id="gameScreen" class="game-screen hidden">
            <div class="phallo-container">
                <div class="balls-left"></div>
                <div class="balls-right"></div>
                <div class="shaft"></div>
                <div class="glans"></div>
                
                <div class="phallo-shape">
                    <div class="fluid-fill" id="fluidFill"></div>
                </div>
                <div class="phallo-mask"></div>
            </div>

            <div class="percentage-label">Arousal Metric: <span id="progressPercent">0</span>%</div>

            <div class="metronome" id="metroDot"></div>

            <div class="instruction-box">
                <div class="style-tag" id="levelDisplay">Level 1</div>
                <div class="metric" id="bpmDisplay">90 BPM</div>
                <div class="timer" id="timeDisplay">Elapsed: 0s</div>
                <div class="high-score hidden" id="highScoreDisplay">Personal Record: 0s</div>
            </div>

            <div class="control-panel">
                <div class="status-text" id="statusMessage">Stroke to the flash...</div>
                
                <!-- Quick Interaction Grid Links -->
                <div class="btn-grid" id="gameplayControls">
                    <button class="action-btn" id="tooCloseBtn" style="background: #e11d48;">Too Close</button>
                    <button class="action-btn" id="iCameBtn" style="background: #2563eb;">I Came</button>
                    <button class="action-btn secondary" id="pauseBtn" style="grid-column: span 2;">Pause</button>
                </div>

                <button class="action-btn hidden" id="resetBtn" style="margin-top: 15px;">Return to Menu</button>
            </div>
        </div>
    </div>
    <script>
        // Engine parameters maps
        let currentLevel = 1;
        let progress = 0; 
        let isPlaying = false;
        let isPaused = false;
        let sessionTime = 0;
        let gameMode = "normal"; // normal, denial, infinite

        let timerInterval = null;
        let metronomeInterval = null;
        let expectedInterval = 1000; 

        // Level Configurations
        const levelConfig = {
            1: { fillPerBeat: 1.50, label: "Level 1: Building Base" },
            2: { fillPerBeat: 0.85, label: "Level 2: Heightened Plateau" },
            3: { fillPerBeat: 0.50, label: "Level 3: Edge Maintenance" },
            4: { fillPerBeat: 0.25, label: "Level 4: Climax Approach" }
        };

        // Randomly picked challenges array
        const penaltyChallenges = [
            "Rub the very tip of your head ONLY for the next 30 seconds. Do not touch the shaft.",
            "Insert a finger or toy to stimulate your prostate directly while maintaining your stroke for 45 seconds.",
            "Halt all stimulation immediately. Clean and consume any pre-cum fluid you leaked during this run before moving on.",
            "Perform light skin-pinches down the length of your shaft to dull sensitivity for the next 30 seconds."
        ];

        // Cache UI anchors
        const setupScreen = document.getElementById('setupScreen');
        const challengeScreen = document.getElementById('challengeScreen');
        const gameScreen = document.getElementById('gameScreen');
        
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const tooCloseBtn = document.getElementById('tooCloseBtn');
        const iCameBtn = document.getElementById('iCameBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const challengeOptBtn = document.getElementById('challengeOptBtn');
        const breakOptBtn = document.getElementById('breakOptBtn');

        const bpmInput = document.getElementById('bpmInput');
        const styleInput = document.getElementById('styleInput');
        const fluidFill = document.getElementById('fluidFill');
        const progressPercent = document.getElementById('progressPercent');
        const levelDisplay = document.getElementById('levelDisplay');
        const bpmDisplay = document.getElementById('bpmDisplay');
        const timeDisplay = document.getElementById('timeDisplay');
        const highScoreDisplay = document.getElementById('highScoreDisplay');
        const metroDot = document.getElementById('metroDot');
        const statusMessage = document.getElementById('statusMessage');
        const gameplayControls = document.getElementById('gameplayControls');

        startBtn.addEventListener('click', () => {
            const chosenBPM = parseInt(bpmInput.value) || 90;
            gameMode = styleInput.value;
            
            setupScreen.classList.add('hidden');
            challengeScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            resetBtn.classList.add('hidden');
            gameplayControls.classList.remove('hidden');
            
            currentLevel = 1;
            sessionTime = 0;
            progress = 0;
            isPaused = false;

            if (gameMode === "infinite") {
                highScoreDisplay.classList.remove('hidden');
                const record = localStorage.getItem("trainer_record") || 0;
                highScoreDisplay.innerText = `Personal Record: ${record}s`;
            } else {
                highScoreDisplay.classList.add('hidden');
            }

            initEngine(chosenBPM);
            startLevel(currentLevel);
        });

        // Gameplay Interaction Assignments
        pauseBtn.addEventListener('click', () => {
            if (!isPlaying && !isPaused) return;
            if (!isPaused) {
                isPaused = true;
                pauseBtn.innerText = "Resume";
                statusMessage.innerText = "SESSION PAUSED";
            } else {
                isPaused = false;
                pauseBtn.innerText = "Pause";
                statusMessage.innerText = "Match your stroke to the flash...";
            }
        });

        tooCloseBtn.addEventListener('click', () => {
            isPaused = true; 
            gameScreen.classList.add('hidden');
            challengeScreen.classList.remove('hidden');
        });

        iCameBtn.addEventListener('click', () => {
            endSession(false, "Ruined Climax! You triggered the button early.");
        });

        resetBtn.addEventListener('click', () => {
            resetToSetup();
        });

        // Too Close Routing Branch Mechanics
        challengeOptBtn.addEventListener('click', () => {
            challengeScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            
            // Draw a completely random requirement task
            const pick = penaltyChallenges[Math.floor(Math.random() * penaltyChallenges.length)];
            statusMessage.innerText = `CHALLENGE: ${pick}`;
            
            // Drop progress bar as a reward
            progress = Math.max(0, progress - 30);
            updateProgress(progress);

            setTimeout(() => {
                isPaused = false;
                statusMessage.innerText = "Challenge complete. Resume standard stroke layout.";
            }, 8000); 
        });

        breakOptBtn.addEventListener('click', () => {
            challengeScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            statusMessage.innerText = "Cooldown Break Active... Hands off.";
            
            progress = Math.max(0, progress - 15);
            updateProgress(progress);

            setTimeout(() => {
                isPaused = false;
                statusMessage.innerText = "Break over. Return to matching the rhythm.";
            }, 6000); 
        });

        function initEngine(bpm) {
            bpmDisplay.innerText = `${bpm} BPM`;
            expectedInterval = (60 / bpm) * 1000;

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!isPaused && isPlaying) {
                    sessionTime++;
                    timeDisplay.innerText = `Elapsed: ${sessionTime}s`;
                    
                    if (gameMode === "infinite") {
                        const currentRecord = parseInt(localStorage.getItem("trainer_record") || 0);
                        if (sessionTime > currentRecord) {
                            localStorage.setItem("trainer_record", sessionTime);
                            highScoreDisplay.innerText = `New Record!: ${sessionTime}s`;
                        }
                    }
                }
            }, 1000);

            clearInterval(metronomeInterval);
            metronomeInterval = setInterval(() => {
                if (!isPaused && isPlaying) triggerBeatPulse();
            }, expectedInterval);
        }

        function startLevel(levelNumber) {
            isPlaying = true;
            if (gameMode === "infinite") {
                levelDisplay.innerText = "Infinite Endurance Mode";
            } else {
                levelDisplay.innerText = levelConfig[levelNumber].label;
            }
            updateProgress(progress);
        }

        function triggerBeatPulse() {
            metroDot.classList.add('pulse');
            setTimeout(() => { metroDot.classList.remove('pulse'); }, 80);

            if (gameMode === "infinite") {
                // In infinite mode, the bar slowly creeps up forever but drains slightly every second
                progress += 0.40;
                if (progress > 100) progress = 100;
                updateProgress(progress);
                return;
            }

            const currentSetting = levelConfig[currentLevel];
            progress += currentSetting.fillPerBeat;

            if (progress >= 100) {
                progress = 100;
                updateProgress(progress);
                advanceGame();
            } else {
                updateProgress(progress);
            }
        }

        function updateProgress(value) {
            fluidFill.style.height = `${value}%`;
            progressPercent.innerText = Math.floor(value);
        }

        function advanceGame() {
            if (levelConfig[currentLevel + 1]) {
                currentLevel++;
                progress = 0; // Reset bar for next level meter depth
                startLevel(currentLevel);
            } else {
                if (gameMode === "denial") {
                    // Trigger total system purge penalty
                    progress = 0;
                    updateProgress(0);
                    endSession(false, "DENIED! Total lockout. Hands down, you are finished.");
                } else {
                    endSession(true, "PERMITTED CLIMAX! You may completely release now.");
                }
            }
        }

        function endSession(success, message) {
            isPlaying = false;
            clearInterval(timerInterval);
            clearInterval(metronomeInterval);
            
            levelDisplay.innerText = success ? "Session Victory" : "Session Over";
            statusMessage.innerText = message;
            
            gameplayControls.classList.add('hidden');
            resetBtn.classList.remove('hidden');
        }

        function resetToSetup() {
            gameScreen.classList.add('hidden');
            setupScreen.classList.remove('hidden');
        }
    </script>
</body>
</html>
